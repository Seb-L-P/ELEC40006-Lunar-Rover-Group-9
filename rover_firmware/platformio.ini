; PlatformIO configuration for EEELunarRover firmware
; Target: Adafruit Metro M0 Express + WINC1500 WiFi shield

[env:adafruit_metro_m0]
platform = atmelsam
board = adafruit_metro_m0
framework = arduino
monitor_speed = 9600
; The Adafruit SAMD core requires a USB stack to be selected (the Arduino IDE
; exposes this as a "USB Stack" menu). Without it, the bundled TinyUSB library
; fails to compile. Selecting TinyUSB resolves it; Serial-over-USB debug still
; works normally.
build_flags = -DUSE_TINYUSB
lib_deps =
    khoih-prog/WiFiWebServer@^1.8.0
    bblanchon/ArduinoJson@^6.21.5
